# 全局 Gradle 配置。
# 使用 IDE（如 Android Studio）时：
# 开发工具中的 Gradle 配置会覆盖本文件中的同名配置。
# 构建环境配置说明可参考：
# 文档地址：http://www.gradle.org/docs/current/userguide/build_environment.html
# 指定 Gradle 守护进程使用的 JVM 参数。
# 该配置常用于调整内存参数。
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
# 启用后，Gradle 会以并行模式执行（实验特性）。
# 该选项建议仅用于已解耦的多模块工程，详见：
# 文档地址：https://developer.android.com/r/tools/gradle-multi-project-decoupled-projects
# 示例配置：org.gradle.parallel=true
# 支持库包结构可明确区分：
# 哪些包随 Android 系统提供，哪些包随应用 APK 打包。
# 文档地址：https://developer.android.com/topic/libraries/support-library/androidx-rn
android.useAndroidX=true
# 启用后，每个库的 R 类只包含该库自身资源，
# 不再包含依赖库资源，从而减小 R 类体积。
android.nonTransitiveRClass=true
